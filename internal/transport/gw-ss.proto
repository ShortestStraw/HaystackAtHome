syntax = "proto3";
package haystack;
option go_package = "./transport";

import "google/protobuf/empty.proto";

enum Error {
	Ok = 0; // Success
	ContextLost = 1; // General retiable error
	NoSpace = 2; // There is no space for PutObj
	ObjExist = 3; // Obj update is not allowed by design
	NotFound = 4; // Obj does not exist
}

message GetServiceInfoReq  {
	google.protobuf.Empty _ = 1;
}

message GetServiceInfoResp {
	uint64 uid = 1; 
}

message PutObjMeta {
	string filepath = 1;
	uint64 size = 2;
}

message PutObjReq {
	oneof data {
		PutObjMeta meta = 1; // First batch
		bytes chunk = 2; // The rest batches. Recomended to be in range 32K-1M
	}
}

message PutObjResp {
	Error err = 1;
}

message GetObjReq {
	string path = 1;
	optional uint32 chunk_sz = 2; // requested chunk size 
}

message GetObjResp {
	oneof data {
		Error err = 1;
		uint64 size = 2; // Object size, returned as first batch if obj exist and can be read
		bytes chunk = 3; // The rest batches. Recomended to be in range 32K-1M
	}
}

message DelObjReq {
	string path = 1;
}

message DelObjResp {
	Error err = 1;
}

/* HaystackAtHome storage server description */
service SS {
	rpc GetServiceInfo(GetServiceInfoReq) returns (GetServiceInfoResp);
	rpc PutObj(stream PutObjReq) returns (PutObjResp);
	rpc GetObj(GetObjReq) returns (stream GetObjResp);
	rpc DelObj(DelObjReq) returns (DelObjResp);
}