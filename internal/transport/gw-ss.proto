syntax = "proto3";
package haystack;
option go_package = "./transport";

message GetServiceInfoReq {}

message StorageSpace {
	uint64 total = 1;
	uint64 used = 2;
}

message StorageFeatures {
	bool checksum = 1;
}

message GetServiceInfoResp {
	uint64 uid = 1;
	StorageSpace space = 2;
	StorageFeatures features = 3;
}

// batch_size is a hint for how many objects to include per stream message.
// 0 means server default.
message GetObjsMapReq {
	uint32 batch_size = 1;
}

message ObjMapMeta {
	uint64 key = 1;
	uint64 size = 2;
}

message GetObjsMapResp {
	repeated ObjMapMeta obj = 1;
}

message PutObjMeta {
	uint64 key = 1;
	uint64 size = 2;
}

message PutObjReq {
	oneof data {
		PutObjMeta meta = 1; // First message
		bytes chunk = 2;     // Subsequent messages. Recommended range: 32K–1M
	}
}

message PutObjResp {}

message GetObjReq {
	uint64 key = 1;
	optional uint32 chunk_sz = 2; // Requested chunk size hint
}

message GetObjResp {
	oneof data {
		uint64 size = 1; // First message: object size in bytes
		bytes chunk = 2; // Subsequent messages: object data
	}
}

message DelObjReq {
	uint64 key = 1;
}

message DelObjResp {}

/* HaystackAtHome storage server */
service SS {
	rpc GetServiceInfo(GetServiceInfoReq) returns (GetServiceInfoResp);
	rpc GetObjsMap(GetObjsMapReq) returns (stream GetObjsMapResp);
	rpc PutObj(stream PutObjReq) returns (PutObjResp);
	rpc GetObj(GetObjReq) returns (stream GetObjResp);
	rpc DelObj(DelObjReq) returns (DelObjResp);
}
